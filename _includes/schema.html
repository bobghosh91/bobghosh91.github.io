<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
  
      {
        "@type": "{{ site.business.type }}",
        "@id": "{{ site.url }}/#organization",
        "name": "{{ site.title }}",
        "url": "{{ site.url }}",
        "telephone": "{{ site.business.phone }}",
        "logo": "{{ site.url }}{{ site.business.logo }}",
        "image": "{{ site.url }}{{ site.image }}",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "{{ site.business.address }}",
          "addressLocality": "{{ site.business.city }}",
          "addressRegion": "{{ site.business.region }}",
          "postalCode": "{{ site.business.zip }}",
          "addressCountry": "{{ site.business.country }}"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": {{ site.business.latitude }},
          "longitude": {{ site.business.longitude }}
        },
        "openingHoursSpecification": {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
          "opens": "09:00",
          "closes": "18:00"
        },
        "sameAs": {{ site.business.social_links | jsonify }}
      }
  
      {% if page.layout == 'author' %}
        {% assign author = site.data.authors[page.author_key] %}
        ,{
          "@type": "Person",
          "@id": "{{ site.url }}{{ page.url }}",
          "name": "{{ author.name }}",
          "jobTitle": "{{ author.title }}",
          "url": "{{ site.url }}{{ page.url }}",
          "image": "{{ site.url }}{{ author.image }}",
          "email": "{{ author.email }}",
          "worksFor": {
            "@id": "{{ site.url }}/#organization"
          },
          "sameAs": [
            {% for link in author.sameAs %}
              "{{ link }}"{% unless forloop.last %},{% endunless %}
            {% endfor %}
          ]
        }
  
      {% elsif page.layout == 'post' %}
        {% assign post_author = site.data.authors[page.author] %}
        ,{
          "@type": "Person",
          "@id": "{{ post_author.url }}",
          "name": "{{ post_author.name }}",
          "jobTitle": "{{ post_author.title }}",
          "url": "{{ post_author.url }}",
          "image": "{{ post_author.image }}",
          "worksFor": {
            "@id": "{{ site.url }}/#organization"
          },
          "sameAs": [
            {% for link in post_author.sameAs %}
              "{{ link }}"{% unless forloop.last %},{% endunless %}
            {% endfor %}
          ]
        }
        ,{
          "@type": "BlogPosting",
          "headline": "{{ page.title | escape }}",
          "description": "{{ page.description | default: page.excerpt | strip_html | truncate: 160 | escape }}",
          "datePublished": "{{ page.date | date_to_xmlschema }}",
          "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
          "image": "{{ site.url }}{{ page.image }}",
          "author": {
            "@id": "{{ post_author.url }}"
          },
          "publisher": {
            "@id": "{{ site.url }}/#organization"
          },
          "mainEntityOfPage": {
            "@type": "WebPage",
            "@id": "{{ site.url }}{{ page.url }}"
          }
        },
        {
          "@type": "BreadcrumbList",
          "itemListElement": [
            {
              "@type": "ListItem",
              "position": 1,
              "name": "Home",
              "item": "{{ site.url }}"
            },
            {
              "@type": "ListItem",
              "position": 2,
              "name": "Investor Education",
              "item": "{{ site.url }}/blog/"
            },
            {
              "@type": "ListItem",
              "position": 3,
              "name": "{{ page.title | escape }}",
              "item": "{{ site.url }}{{ page.url }}"
            }
          ]
        }
  
      {% else %}
        ,{
          "@type": "Person",
          "@id": "{{ site.url }}/#author",
          "name": "{{ site.author }}",
          "jobTitle": "{{ site.author_job_title }}",
          "worksFor": {
            "@id": "{{ site.url }}/#organization"
          }
        }
      {% endif %}
  
    ]
  }
  </script>
