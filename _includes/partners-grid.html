<section class="py-12 bg-gray-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-gray-900 mb-4">Our Partners</h2>
            <p class="text-lg text-gray-600">Trusted mutual fund partners we work with</p>
        </div>
        
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 items-center">
            {% for partner in site.data.partners %}
            <div class="bg-white p-3 rounded-lg shadow-sm hover:shadow-md transition-all hover:-translate-y-2" title="{{ partner.name }}">
                <a href="{{ partner.website }}" target="_blank" rel="noopener" class="block">
                    <img src="{{ partner.logo | relative_url }}" alt="{{ partner.name }}" class="h-10 w-auto mx-auto object-contain">
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
