<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% seo %}
  <!-- Favicon -->
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/favicon/apple-touch-icon.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon/favicon-32x32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/favicon/favicon-16x16.png' | relative_url }}">
  <link rel="manifest" href="{{ '/assets/favicon/site.webmanifest' | relative_url }}">
  <link rel="shortcut icon" href="{{ '/assets/favicon/favicon.ico' | relative_url }}">
  <link rel="icon" href="{{ '/assets/favicon/favicon.ico' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <!-- <script src="https://cdn.tailwindcss.com"></script> -->
  <script src="https://unpkg.com/feather-icons"></script>
	<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
	<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FinancialService",
      "name": "{{ site.title }}",
      "image": "{{ site.url }}{{ site.image }}",
      "@id": "{{ site.url }}",
      "url": "{{ site.url }}",
      "telephone": "+919476310780",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "87XP+27F, near yuvasangha club, Dhekeya, Malancha",
        "addressLocality": "Kharagpur",
        "addressRegion": "West Bengal",
        "postalCode": "721304",
        "addressCountry": "IN"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 22.34309,
        "longitude": 87.3012875
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": [
          "Monday",
          "Tuesday",
          "Wednesday",
          "Thursday",
          "Friday",
          "Saturday"
        ],
        "opens": "09:00",
        "closes": "18:00"
      }
    }
    </script>
</head>
<body>

  <!-- Navbar -->
  {% include navbar.html %}

  <!-- Page content -->
  <main>
    {{ content }}
  </main>

  <!-- Footer -->
  {% include footer.html %}

  <!-- Floating buttons-->

  <!-- JS for Mobile Menu Toggle -->
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const menuButton = document.getElementById("mobile-menu-button");
      const menu = document.getElementById("mobile-menu");

      if (menuButton && menu) {
        menuButton.addEventListener("click", () => {
          menu.classList.toggle("hidden");
          const expanded = menuButton.getAttribute("aria-expanded") === "true" || false;
          menuButton.setAttribute("aria-expanded", !expanded);
        });
      }

      // Activate feather icons
      if (typeof feather !== "undefined") {
        feather.replace();
      }

      // Initialize animations and icons
      AOS.init({
          duration: 800,
          easing: 'ease-in-out',
          once: true
      });
    });
  </script>
</body>
</html>
