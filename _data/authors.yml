# bio: "Growing up in Kharagpur, Bob watched hardworking people around him never quite get ahead financially — not because they weren't disciplined, but because nobody had shown them what to do beyond a savings account or FD. As an engineer, he was drawn to systems and outcomes. When he discovered equity mutual funds, something clicked — a simple, transparent tool that most people in smaller cities had never heard of, or had been mis-sold something complicated they didn't understand. That gap is why Earthen Capital exists. Bob started it with one belief: that a salaried professional in Kharagpur deserves the same quality of financial guidance as someone in Mumbai. No product pushing. No commission-driven recommendations. Just honest, goal-based planning. One of his earliest wins was helping a friend stop parking all his savings in fixed deposits and instead build a mutual fund portfolio aligned to his child's education timeline — a first SIP that finally made him feel in control of his financial future. Today Bob works primarily with salaried professionals who have steady incomes and real goals, and just need a trusted guide to help them get there."


