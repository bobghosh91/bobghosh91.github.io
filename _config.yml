  type: "FinancialService"
  phone: "+919476310780"
  logo: "/assets/og-logo.png"
  address: "87XP+27F, near yuvasangha club, Dhekeya, Malancha"
  city: "Kharagpur"
  region: "West Bengal"
  zip: "721304"
  country: "IN"
  latitude: 22.3475722
  longitude: 87.2856648
  hasMap: "https://www.google.com/maps/place/Earthen+Capital/@22.3475722,87.2830899,17z/data=!3m1!4b1!4m6!3m5!1s0x3a1d43892c5a1f33:0x35104b5c65a8c07c!8m2!3d22.3475722!4d87.2856648!16s%2Fg%2F11mrmncrfj"
  arn: "ARN-345670"
  social_links:
    - "https://instagram.com/earthen.capital"
    - "https://facebook.com/earthencapital"
