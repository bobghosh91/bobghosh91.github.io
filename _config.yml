# Social image for previews
image: /assets/og-logo.png

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "bob"
      author_image: "/assets/authors/bob-ghosh.jpg"
      read_time: "5 min read"
      featured: false
      featured_order:

# Build settings
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

include:
  - _pages

permalink: /posts/:title

copyright:
  start_year: 2025

exclude:
  - assets/css/input.css
  - node_modules/
  - package.json
  - package-lock.json
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/