# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.

# Site settings
title: Earthen Capital
email: earthencapital@gmail.com
description: >-
  Expert financial planning and investment advisory services based in West Bengal, India. 
  Specializing in Stock Market, Mutual Funds, Fixed Income, and tailored Wealth Management 
  solutions to help you secure a stable financial future.
baseurl: ""
url: "https://earthencapital.in"

# SEO & Social
author: bob
author_job_title: "Founder & Mutual Fund Distributor"
twitter_username: earthencapital
instagram_username: earthen.capital
facebook_username: earthencapital
youtube_username: "EarthenCapital"

# Business block
